name: Build MPM Solver

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 numpy
      shell: pwsh
    
    - name: Install CUDA
      uses: Jimver/cuda-toolkit@v0.2.15
      id: cuda-toolkit
      with:
        cuda: '12.4.0'
        use-local-cache: false
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Configure CMake
      run: |
        cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
      shell: pwsh
    
    - name: Build
      run: |
        cmake --build build --config Release --parallel 4
      shell: pwsh
    
    - name: Prepare addon
      run: |
        if (Test-Path build\bindings\Release\pympm*.pyd) {
          Copy-Item build\bindings\Release\pympm*.pyd blender_mpm\lib\pympm.pyd
        }
        if (Test-Path "$env:CUDA_PATH\bin\cudart64_12.dll") {
          Copy-Item "$env:CUDA_PATH\bin\cudart64_12.dll" blender_mpm\lib\
        }
        Compress-Archive -Path blender_mpm -DestinationPath blender_mpm_addon_windows.zip -Force
      shell: pwsh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: blender_mpm_addon_windows
        path: blender_mpm_addon_windows.zip
        if-no-files-found: warn
